name: test

# PR 검사이자, deploy.yml 이 배포 전에 호출하는 관문이기도 하다.
#
# workflow_call 로 재사용하는 게 핵심이다. 예전에는 deploy.yml 이 pytest 만 따로 돌렸는데,
# 그러면 main 에 직접 푸시했을 때 시크릿 스캔과 프런트 타입체크를 통째로 우회할 수 있었다.
# (브랜치 보호는 비공개 레포 무료 플랜에서 켤 수 없어 직접 푸시를 막을 수단이 없다.)
# 통과 기준은 한 곳에만 있어야 한다.
on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r api/requirements.txt pytest
      - run: python -m pytest api/tests -q
      # 앱이 import 단계에서 터지지 않는지 — 라우터 등록 누락·순환참조를 여기서 잡는다.
      # DB 접속은 하지 않는다(startup 훅은 실패해도 앱이 뜨도록 되어 있다).
      - name: Import check
        run: python -c "import api.main; print('routes:', len(api.main.app.routes))"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: https://mindlens-api-128792069861.asia-northeast3.run.app

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 키가 커밋에 섞여 들어오는 걸 막는다. .env.local 은 gitignore 에 있지만
      # 사람이 실수로 다른 파일에 붙여넣는 경우가 실제로 잦다.
      - name: Scan for secrets
        run: |
          # 이 스텝의 규칙 문구 자체가 패턴에 걸리므로 워크플로 디렉터리는 항상 제외한다.
          # (전에는 첫 규칙에만 제외가 있어 두 번째 규칙이 자기 자신을 잡았다.)
          EXCLUDE=':!.github/workflows/*'
          FAIL=0
          scan() {
            if git grep -nIE "$1" -- . "$EXCLUDE"; then
              echo "::error::$2"
              FAIL=1
            fi
          }
          scan 'furiosa-[A-Za-z0-9]{20,}' 'Furiosa API 키로 보이는 문자열이 커밋에 있다. Secret Manager 를 쓸 것.'
          scan '"private_key"[[:space:]]*:|BEGIN (RSA |EC )?PRIVATE KEY' '서비스 계정 키/개인키가 커밋에 있다.'
          scan 'postgresql://[^[:space:]"]*:[^[:space:]"@]+@' 'DB 접속 문자열에 비밀번호가 박혀 있다.'
          # 한 번에 다 보여준다 — 하나 고치고 다시 돌렸더니 또 걸리는 걸 반복하지 않도록.
          [ "$FAIL" = "0" ] || exit 1
          echo "시크릿 스캔 통과"
