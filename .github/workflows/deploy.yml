name: deploy

# main 에 들어오면 배포한다. PR 은 test.yml 이 검사만 한다.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: "변경 감지를 무시하고 둘 다 배포"
        type: boolean
        default: false

env:
  PROJECT_ID: mindlens-furiosa-2026
  REGION: asia-northeast3
  API_SERVICE: mindlens-api
  WEB_SERVICE: mindlens-web
  API_URL: https://mindlens-api-128792069861.asia-northeast3.run.app
  WEB_URL: https://mindlens-web-128792069861.asia-northeast3.run.app

# 배포가 겹치면 Cloud Run 리비전이 엉킨다. 뒤에 온 것만 남기고 진행 중인 건 취소한다.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        # 웹 재빌드는 3분 걸린다. 백엔드만 고쳤는데 웹까지 굽지 않도록 경로로 가른다.
        # 비교 대상을 못 잡으면(첫 푸시·force push) 안전하게 둘 다 배포한다.
        run: |
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            echo "api=true" >> "$GITHUB_OUTPUT"; echo "web=true" >> "$GITHUB_OUTPUT"
            echo "수동 실행 — 둘 다 배포"; exit 0
          fi
          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "api=true" >> "$GITHUB_OUTPUT"; echo "web=true" >> "$GITHUB_OUTPUT"
            echo "이전 커밋 없음 — 둘 다 배포"; exit 0
          fi
          CHANGED=$(git diff --name-only HEAD^ HEAD)
          echo "변경된 파일:"; echo "$CHANGED"
          echo "api=$(echo "$CHANGED" | grep -q '^api/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "web=$(echo "$CHANGED" | grep -q '^web/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r api/requirements.txt pytest
      # 배포 전 마지막 관문. 여기가 빨간데 배포되면 안 된다.
      - run: python -m pytest api/tests -q

  deploy-api:
    needs: [changes, test]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # WIF 용 OIDC 토큰 발급
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/128792069861/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-deployer@mindlens-furiosa-2026.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2

      # 환경변수·시크릿은 여기서 다시 지정하지 않는다. 기존 서비스 설정을 그대로 물려받아
      # 이미지만 바꾼다 — 워크플로에 값이 빠지면 조용히 설정이 지워지기 때문이다.
      - name: Deploy API
        run: |
          gcloud run deploy "$API_SERVICE" \
            --source=api \
            --region="$REGION" --project="$PROJECT_ID" --quiet

      - name: Smoke test
        run: |
          for i in $(seq 1 10); do
            BODY=$(curl -fsS --max-time 20 "$API_URL/health") && break
            echo "재시도 $i…"; sleep 6
          done
          echo "$BODY"
          echo "$BODY" | grep -q '"ok":true' || { echo "health 실패"; exit 1; }
          echo "$BODY" | grep -q '"llm_key_present":true' || { echo "LLM 키가 주입되지 않았다"; exit 1; }

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(gcloud run revisions list --service="$API_SERVICE" --region="$REGION" \
            --project="$PROJECT_ID" --format="value(name)" --sort-by="~metadata.creationTimestamp" \
            | sed -n 2p)
          if [ -n "$PREV" ]; then
            echo "직전 리비전으로 되돌린다: $PREV"
            gcloud run services update-traffic "$API_SERVICE" --region="$REGION" \
              --project="$PROJECT_ID" --to-revisions="$PREV=100" --quiet
          fi

  deploy-web:
    needs: [changes, test]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/128792069861/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-deployer@mindlens-furiosa-2026.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2

      # NEXT_PUBLIC_* 는 클라이언트 번들에 굽히므로 런타임이 아니라 빌드타임에 들어가야 한다.
      - name: Build image
        run: |
          IMG="$REGION-docker.pkg.dev/$PROJECT_ID/mindlens/mindlens-web:${GITHUB_SHA::12}"
          echo "IMG=$IMG" >> "$GITHUB_ENV"
          gcloud builds submit web --config=web/cloudbuild.yaml \
            --substitutions="_IMAGE=$IMG,_API_BASE=$API_URL" \
            --project="$PROJECT_ID" --region="$REGION"

      - name: Deploy web
        run: |
          gcloud run deploy "$WEB_SERVICE" --image="$IMG" \
            --region="$REGION" --project="$PROJECT_ID" --quiet

      - name: Smoke test
        run: |
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$WEB_URL/")
            [ "$CODE" = "200" ] && break
            echo "재시도 $i (code=$CODE)…"; sleep 6
          done
          [ "$CODE" = "200" ] || { echo "웹이 200 을 주지 않는다: $CODE"; exit 1; }
          echo "웹 정상"

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(gcloud run revisions list --service="$WEB_SERVICE" --region="$REGION" \
            --project="$PROJECT_ID" --format="value(name)" --sort-by="~metadata.creationTimestamp" \
            | sed -n 2p)
          if [ -n "$PREV" ]; then
            echo "직전 리비전으로 되돌린다: $PREV"
            gcloud run services update-traffic "$WEB_SERVICE" --region="$REGION" \
              --project="$PROJECT_ID" --to-revisions="$PREV=100" --quiet
          fi
