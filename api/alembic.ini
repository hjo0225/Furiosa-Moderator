# Alembic 설정.
# sqlalchemy.url 은 여기 두지 않는다 — env.py 가 db.py 의 엔진(Cloud SQL Connector /
# DATABASE_URL)을 그대로 쓰므로 접속 정보가 한 곳(config.py/db.py)에만 산다.
[alembic]
# %(here)s = 이 ini 파일이 있는 디렉터리(api/). CWD 와 무관하게 경로가 고정된다.
script_location = %(here)s/alembic
# repo 루트를 sys.path 에 올려 env.py 의 `import api.services.db` 가 어디서 돌든 붙게 한다.
prepend_sys_path = %(here)s/..

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
